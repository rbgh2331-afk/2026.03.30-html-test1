<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .hero {
            color: rgb(255, 255, 255);
            height: 500px;
            background-image: url('apple.jpg');
            background-position: center;
            background-attachment: fixed;
        }

        .box {
            color: rgb(255, 255, 255);
            width: 200px; padding: 20px;
            border: 10px dashed white;
            background-image: url(dog1.jpg);
            background-origin: content-box;
        }

        .stripe-pattern {
            width: 100%; height: 100px;
            background: repeating-linear-gradient(
                45deg,
                #ffffff, #e0dabc 10px,
                #ffffff 10px, #afe2c6 20px
            );
        }
        .card-bg {
            color: rgb(255, 255, 255);
            width: 100%; height: 200px;
            background: #404041 url('logo1.jpg') no-repeat center / contain;
        }

        .block-span { 
            display: block; 
            background: #9068fd; 
        }
        
        .inline-p { 
            display: inline; 
            border: 1px solid rgb(119, 119, 119); 
        }

        .box-example {
            width: 250px; height: 100px;
            background-color: #bcceeb;
            padding: 20px;
            border: 4px solid #277597;
            margin: 30px;
        }
    </style>
</head>

<body>
    <section class="hero">
        <h1>패럴랙스 배경 효과</h1>
    </section>

    <br>

    <div class="box">내용 영역에서 이미지가 시작됨</div>
    <p class="box">내용 영역에서 이미지가 시작됨</p>
    
    <br>

    <div class="stripe-pattern"></div>

    <br>

    <div class="card-bg">
        <p>배경 정보가 축약 적용됨</p>
    </div>

    <h1>블록 레벨 요소</h1>
    <p class="inline-p">단락 태그도 블록입니다.</p>
    <span>인라인 요소 1</span>
    <span>인라인 요소 2</span>
    <span class="block-span">블록이 된 인라인 요소</span>

    <br>

    <div class="box-example">Box Model content</div>
</body>
</html>
